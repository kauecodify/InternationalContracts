<!-- 
 
Informar o valor total do contrato.
Informar quanto deseja alocar/aplicar.
Ver sua participação percentual.
Ver o valor proporcional estimado considerando o prêmio ESG de <8% e a variação cambial simulada. 
"considerar a cotação atual do dólar e simular uma queda projetada (ex: -5%) para calcular o impacto no valor final do contrato".
se 8% for demais eh só alterar na linha 92
-->

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Control View</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
        }

        button {
            padding: 12px 20px;
            cursor: pointer;
        }

        .resultado {
            margin-top: 20px;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <div class="card">

        <h2>ESG Control View (Wholesale)</h2>

        <label>Base Contract Value (USD)</label>
        <input type="number" id="valorBase" step="0.01">

        <label>Application Value (USD)</label>
        <input type="number" id="valorAplicado" step="0.01">

        <label>Current Dollar Rate (BRL)</label>
        <input type="number" id="cotacao" step="0.0001">

        <label>Projected Dollar Decline (%)</label>
        <input type="number" id="queda" step="0.001">

        <button onclick="calcular()">Calculate</button>

        <div class="resultado" id="resultado"></div>

    </div>

    <script>
        function calcular() {

            const valorBase =
                parseFloat(document.getElementById('valorBase').value) || 0;

            const valorAplicado =
                parseFloat(document.getElementById('valorAplicado').value) || 0;

            const cotacao =
                parseFloat(document.getElementById('cotacao').value) || 0;

            const queda =
                parseFloat(document.getElementById('queda').value) || 0;

            // ESG Premium / Tax = 8%
            const valorComESG = valorBase * 1.08;

            // Cotação ajustada
            const novaCotacao =
                cotacao * (1 - queda / 100);

            // Valor total do contrato em BRL
            const valorFinalBRL =
                valorComESG * novaCotacao;

            // Participação do investidor
            const percentualParticipacao =
                valorBase > 0
                    ? (valorAplicado / valorBase)
                    : 0;

            // Valor proporcional recebido
            const retornoEstimado =
                valorFinalBRL * percentualParticipacao;

            document.getElementById("resultado").innerHTML = `
        <hr>

        <p><strong>Contract Value + ESG (USD):</strong>
        US$ ${valorComESG.toLocaleString()}</p>

        <p><strong>Adjusted Dollar Rate:</strong>
        R$ ${novaCotacao.toFixed(4)}</p>

        <p><strong>Total Contract Value:</strong>
        R$ ${valorFinalBRL.toLocaleString('pt-BR', {
                minimumFractionDigits: 2
            })}</p>

        <p><strong>Participation:</strong>
        ${(percentualParticipacao * 100).toFixed(2)}%</p>

        <p><strong>Estimated Return:</strong>
        R$ ${retornoEstimado.toLocaleString('pt-BR', {
                minimumFractionDigits: 2
            })}</p>
    `;
        }
    </script>

</body>

</html>
